name: Lint

on:
  push:
    branches: [main]
  pull_request:

env:
  RUFF_VERSION: "0.15.5"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          version: ${{ env.RUFF_VERSION }}
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          version: ${{ env.RUFF_VERSION }}
          args: format --check
