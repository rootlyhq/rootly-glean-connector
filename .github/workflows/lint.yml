name: Lint

on:
  push:
    branches: [main]
  pull_request:

env:
  RUFF_VERSION: "0.15.5"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          version: ${{ env.RUFF_VERSION }}
          args: check
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          version: ${{ env.RUFF_VERSION }}
          args: format --check
